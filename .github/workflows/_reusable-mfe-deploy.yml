# Reusable: build a single MFE (or the shell) and deploy it as a static
# bundle behind nginx in the same k8s cluster.  Each MFE is its own
# deployment + service + ingress path so we can roll independently.
#
# Why nginx-in-k8s instead of S3+CDN: keeps everything on the user's VPS,
# zero cloud-vendor dependency.  Switch to S3+CloudFront later by changing
# only this workflow.
name: _mfe-deploy

on:
  workflow_call:
    inputs:
      mfe-name: { required: true, type: string, description: "e.g. mfe-identity, or 'shell'" }
      changed:  { required: true, type: boolean }
      deploy:   { required: true, type: boolean }

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-test:
    if: ${{ inputs.changed }}
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: frontend }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter '@tms/shared' --filter '@tms/design-system' build
      - run: pnpm --filter '@tms/${{ inputs.mfe-name }}' typecheck
      - name: Build MFE
        run: pnpm --filter '@tms/${{ inputs.mfe-name }}' build
        env:
          # When the shell builds for prod, point its remotes at the prod URLs
          # (each MFE has its own subdomain or path under the same gateway).
          VITE_MFE_IDENTITY_URL:   https://app.helloworlds.com/mfe/identity/remoteEntry.js
          VITE_MFE_OPERATIONS_URL: https://app.helloworlds.com/mfe/operations/remoteEntry.js
          VITE_MFE_DISPATCH_URL:   https://app.helloworlds.com/mfe/dispatch/remoteEntry.js
          VITE_MFE_TRACKING_URL:   https://app.helloworlds.com/mfe/tracking/remoteEntry.js
          VITE_MFE_FINANCE_URL:    https://app.helloworlds.com/mfe/finance/remoteEntry.js
          VITE_MFE_PAYROLL_URL:    https://app.helloworlds.com/mfe/payroll/remoteEntry.js
          VITE_MFE_COMPLIANCE_URL: https://app.helloworlds.com/mfe/compliance/remoteEntry.js
          VITE_MFE_DOCUMENTS_URL:  https://app.helloworlds.com/mfe/documents/remoteEntry.js
          VITE_MFE_REPORTS_URL:    https://app.helloworlds.com/mfe/reports/remoteEntry.js
          VITE_API_BASE: https://app.helloworlds.com/api

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.mfe-name }}-dist
          path: frontend/${{ inputs.mfe-name }}/dist
          retention-days: 1

  image-and-deploy:
    if: ${{ inputs.deploy }}
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.mfe-name }}-dist
          path: dist

      - name: Write nginx Dockerfile
        # We could keep this Dockerfile in infra/, but inlining it makes the
        # build self-contained and keeps a redeploy from depending on infra/
        # being on the right commit.  Tiny image, ~20 MB.
        run: |
          cat > Dockerfile.mfe <<'EOF'
          FROM nginx:1.27-alpine
          COPY dist /usr/share/nginx/html
          COPY nginx.conf /etc/nginx/conf.d/default.conf
          EXPOSE 80
          EOF
          cat > nginx.conf <<'EOF'
          server {
            listen 80;
            server_name _;
            root /usr/share/nginx/html;

            # remoteEntry.js MUST always be revalidated; chunks are immutable.
            location = /remoteEntry.js { add_header Cache-Control "no-cache"; try_files $uri =404; }
            location ~* \.(?:js|css|woff2?|png|jpg|svg)$ {
              add_header Cache-Control "public, max-age=31536000, immutable";
              try_files $uri =404;
            }

            # SPA fallback only for the shell — every MFE is a remote, not a page.
            location / { try_files $uri $uri/ /index.html; }

            # CORS so the shell at app.helloworlds.com can fetch
            # remoteEntry.js from mfe-*.helloworlds.com / sub-paths.
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
          }
          EOF

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          SHORT="${GITHUB_SHA::12}"
          BASE="${REGISTRY}/${IMAGE_NAMESPACE}/${{ inputs.mfe-name }}"
          echo "image_sha=${BASE,,}:${SHORT}" >> $GITHUB_OUTPUT
          echo "image_main=${BASE,,}:main"   >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mfe
          push: true
          tags: |
            ${{ steps.meta.outputs.image_sha }}
            ${{ steps.meta.outputs.image_main }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to k8s
        run: |
          curl -sLo kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/kustomize

          cd infra/k8s/overlays/prod/${{ inputs.mfe-name }}
          kustomize edit set image ${{ inputs.mfe-name }}=${{ steps.meta.outputs.image_sha }}
          kustomize build . | kubectl apply -f -
          kubectl rollout status deployment/${{ inputs.mfe-name }} -n tms --timeout=3m
