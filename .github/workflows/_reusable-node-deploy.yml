# Reusable: build+test+push+deploy the Node tracking-service.
name: _node-deploy

on:
  workflow_call:
    inputs:
      service-name: { required: true, type: string }
      changed:      { required: true, type: boolean }
      deploy:       { required: true, type: boolean }

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-test:
    if: ${{ inputs.changed }}
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: backend/${{ inputs.service-name }} }
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: backend/${{ inputs.service-name }}/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  image-and-deploy:
    if: ${{ inputs.deploy }}
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          SHORT="${GITHUB_SHA::12}"
          BASE="${REGISTRY}/${IMAGE_NAMESPACE}/${{ inputs.service-name }}"
          echo "image_sha=${BASE,,}:${SHORT}" >> $GITHUB_OUTPUT
          echo "image_main=${BASE,,}:main"   >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: backend/${{ inputs.service-name }}
          file: backend/${{ inputs.service-name }}/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_sha }}
            ${{ steps.meta.outputs.image_main }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to k8s
        run: |
          curl -sLo kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/kustomize

          cd infra/k8s/overlays/prod/${{ inputs.service-name }}
          kustomize edit set image ${{ inputs.service-name }}=${{ steps.meta.outputs.image_sha }}
          kustomize build . | kubectl apply -f -
          kubectl rollout status deployment/${{ inputs.service-name }} -n tms --timeout=5m
