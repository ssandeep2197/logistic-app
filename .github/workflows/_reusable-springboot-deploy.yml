# Reusable workflow: build+test+push+deploy a single Spring Boot microservice.
# Called by ci.yml from a matrix; all inputs come from the caller.
name: _springboot-deploy

on:
  workflow_call:
    inputs:
      service-name: { required: true, type: string, description: "e.g. identity-service" }
      service-port: { required: true, type: number, description: "container port to EXPOSE" }
      changed:      { required: true, type: boolean, description: "true if this service's paths changed" }
      deploy:       { required: true, type: boolean, description: "true to push image and apply k8s" }

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-test:
    if: ${{ inputs.changed }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - uses: gradle/actions/setup-gradle@v4

      - name: Build + test ${{ inputs.service-name }}
        working-directory: backend
        run: ./gradlew :${{ inputs.service-name }}:build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service-name }}-tests
          path: backend/${{ inputs.service-name }}/build/reports/tests
          if-no-files-found: ignore

  image-and-deploy:
    if: ${{ inputs.deploy }}
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          SHORT="${GITHUB_SHA::12}"
          BASE="${REGISTRY}/${IMAGE_NAMESPACE}/${{ inputs.service-name }}"
          echo "image_sha=${BASE,,}:${SHORT}" >> $GITHUB_OUTPUT
          echo "image_main=${BASE,,}:main"   >> $GITHUB_OUTPUT

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.service
          build-args: |
            SERVICE=${{ inputs.service-name }}
            PORT=${{ inputs.service-port }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_sha }}
            ${{ steps.meta.outputs.image_main }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy ${{ inputs.service-name }} to k8s
        # kustomize edit sets the image tag in the prod overlay; kubectl apply
        # rolls only this deployment (RollingUpdate with maxUnavailable=0).
        run: |
          curl -sLo /usr/local/bin/kustomize https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf /usr/local/bin/kustomize -C /usr/local/bin
          chmod +x /usr/local/bin/kustomize

          cd infra/k8s/overlays/prod/${{ inputs.service-name }}
          kustomize edit set image ${{ inputs.service-name }}=${{ steps.meta.outputs.image_sha }}
          kustomize build . | kubectl apply -f -

          kubectl rollout status deployment/${{ inputs.service-name }} -n tms --timeout=5m
