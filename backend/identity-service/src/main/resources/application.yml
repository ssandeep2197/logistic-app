# Default profile values — local dev overrides via application-local.yml.
# Production overrides via env vars (Spring picks them up automatically).

spring:
  application:
    name: identity-service
  profiles:
    default: local
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tms?currentSchema=identity}
    username: ${DATABASE_USER:identity_svc}
    password: ${DATABASE_PASSWORD:identity_dev_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate          # Liquibase owns the schema; ddl-auto must NEVER be `update`.
    properties:
      hibernate:
        default_schema: identity
        jdbc.time_zone: UTC
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: identity
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true

server:
  port: ${SERVER_PORT:8001}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      service: identity-service

tms:
  security:
    enable-rls-guc: true
    public-paths:
      - /auth/login
      - /auth/refresh
      - /auth/signup
      - /auth/oauth/**            # /auth/oauth/google/start + /callback
    jwt:
      signing-key: ${JWT_SIGNING_KEY:local-dev-key-change-me-please-at-least-32-bytes}
      access-token-ttl: PT15M
      refresh-token-ttl: P30D
      issuer: tms-identity
  messaging:
    outbox:
      enabled: true
      poll-ms: 1000
  oauth:
    google:
      # Blank = OAuth disabled at runtime; the /auth/oauth/google/* endpoints
      # return 503 until the credentials are populated via env / k8s Secret.
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      # Must match EXACTLY what's registered in Google Cloud Console.
      redirect-uri: ${GOOGLE_REDIRECT_URI:https://tms.helloworlds.co.in/api/identity/auth/oauth/google/callback}
      # Public origin of the SPA.  Used to build the three browser-side
      # destinations (success → /login/oauth-callback, error → /login,
      # workspace-needs-slug → /signup/workspace).
      frontend-base-url: ${OAUTH_FRONTEND_BASE_URL:https://tms.helloworlds.co.in}

logging:
  pattern:
    correlation: '[reqId=%X{requestId:-} tenant=%X{tenantId:-} user=%X{userId:-}] '
  level:
    com.helloworlds.tms: DEBUG
    org.hibernate.SQL: INFO
