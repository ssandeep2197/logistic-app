spring:
  application: { name: notification-service }
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}     # MailHog in dev
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:false}
server: { port: ${SERVER_PORT:8010}, shutdown: graceful }
management:
  endpoints: { web: { exposure: { include: health,info,metrics,prometheus } } }
tms:
  security:
    jwt:
      signing-key: ${JWT_SIGNING_KEY:local-dev-key-change-me-please-at-least-32-bytes}
      issuer: tms-identity
