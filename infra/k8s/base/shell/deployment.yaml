apiVersion: apps/v1
kind: Deployment
metadata:
  name: shell
  namespace: tms
  labels: { app: shell, app.kubernetes.io/part-of: tms-frontend }
spec:
  replicas: 2
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 1, maxUnavailable: 0 } }
  selector: { matchLabels: { app: shell } }
  template:
    metadata: { labels: { app: shell } }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: shell
          image: ghcr.io/helloworlds/shell:placeholder
          ports: [{ name: http, containerPort: 80 }]
          resources:
            requests: { cpu: "20m", memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
          readinessProbe: { httpGet: { path: /, port: http }, initialDelaySeconds: 2, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /, port: http }, periodSeconds: 30 }
