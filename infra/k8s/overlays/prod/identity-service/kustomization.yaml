apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tms

resources:
  - ../../../base/identity-service

# Image tag is rewritten by `kustomize edit set image` in CI before apply.
images:
  - name: ghcr.io/helloworlds/identity-service
    newTag: placeholder

# Prod-only patches: scale up + tighter resources + prod log level.
patches:
  - target: { kind: Deployment, name: identity-service }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
