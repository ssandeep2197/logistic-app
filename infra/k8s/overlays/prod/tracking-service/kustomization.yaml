apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tms

resources:
  - ../../../base/tracking-service

images:
  - name: ghcr.io/helloworlds/tracking-service
    newTag: placeholder

patches:
  - target: { kind: Deployment, name: tracking-service }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
