# Single-replica Postgres with TimescaleDB + PostGIS pre-installed.
# Backed by a PVC on k3s's default local-path provisioner — survives pod
# restarts on the same node, NOT a node failure.  For HA, switch to a
# managed Postgres or run a CloudNativePG operator.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tms-postgres-data
  namespace: tms
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tms-postgres
  namespace: tms
spec:
  replicas: 1
  strategy:
    type: Recreate            # Postgres + RWO PVC: never two pods at once
  selector:
    matchLabels: { app: tms-postgres }
  template:
    metadata:
      labels: { app: tms-postgres }
    spec:
      containers:
        - name: postgres
          image: timescale/timescaledb-ha:pg16
          imagePullPolicy: IfNotPresent
          ports:
            - { name: pg, containerPort: 5432 }
          env:
            - { name: POSTGRES_USER, value: tms }
            - { name: POSTGRES_DB, value: tms }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: tms-postgres-secret, key: superuser-password } }
            - name: PGDATA
              # Use a subdirectory so init scripts don't trip on lost+found etc.
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
            - { name: init, mountPath: /docker-entrypoint-initdb.d }
            - { name: svc-passwords, mountPath: /run/secrets/svc-passwords, readOnly: true }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "tms", "-d", "tms"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "tms", "-d", "tms"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits:   { cpu: "2000m", memory: "2Gi" }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: tms-postgres-data }
        - name: init
          configMap:
            name: tms-postgres-init
            defaultMode: 0o755
        - name: svc-passwords
          secret: { secretName: tms-svc-passwords }
---
apiVersion: v1
kind: Service
metadata:
  name: tms-postgres
  namespace: tms
spec:
  selector: { app: tms-postgres }
  ports:
    - { name: pg, port: 5432, targetPort: pg }
  # Headless? No — services need a stable cluster IP for round-robin.
  type: ClusterIP
