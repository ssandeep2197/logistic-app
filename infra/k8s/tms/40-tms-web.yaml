# Static frontend: shell + mfe-identity bundled into one nginx image.
# When more MFEs come online we can split them into separate Deployments
# and route via additional /mfe/<name>/ ingress paths.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tms-web
  namespace: tms
  labels: { app: tms-web }
spec:
  replicas: 1                  # bump after we wire HPA
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: tms-web }
  template:
    metadata:
      labels: { app: tms-web }
    spec:
      automountServiceAccountToken: false
      containers:
        - name: web
          image: tms-web:latest
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 80 }]
          resources:
            requests: { cpu: "20m", memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tms-web
  namespace: tms
spec:
  selector: { app: tms-web }
  ports:
    - { name: http, port: 80, targetPort: http }
